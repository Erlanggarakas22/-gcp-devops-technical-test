name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}
  SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE }}
  IMAGE_NAME: devops-test-app

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker authentication
        run: |
          gcloud auth configure-docker \
            "${REGION}-docker.pkg.dev" \
            --quiet

      - name: Define image URI
        id: image
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_URI="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"

          echo "uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"
          echo "Image URI: ${IMAGE_URI}"

      - name: Build Docker image
        run: |
          docker build \
            --tag "${{ steps.image.outputs.uri }}" \
            ./app

      - name: Push Docker image
        run: |
          docker push "${{ steps.image.outputs.uri }}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --project="${PROJECT_ID}" \
            --image="${{ steps.image.outputs.uri }}" \
            --region="${REGION}" \
            --platform=managed \
            --quiet

      - name: Get Cloud Run URL
        id: service
        shell: bash
        run: |
          set -euo pipefail

          SERVICE_URL="$(gcloud run services describe "${SERVICE_NAME}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --format="value(status.url)")"

          echo "url=${SERVICE_URL}" >> "${GITHUB_OUTPUT}"
          echo "Cloud Run URL: ${SERVICE_URL}"

      - name: Smoke test
        run: |
          curl \
            --fail \
            --show-error \
            --silent \
            --retry 6 \
            --retry-delay 10 \
            "${{ steps.service.outputs.url }}/healthz"
